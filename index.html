<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chabybot AI ✨</title>
    
    <meta name="theme-color" content="#0891b2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
        }
        .chat-container {
            height: calc(100vh - 180px);
            scrollbar-width: thin;
            scrollbar-color: #1e293b #0f172a;
        }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: #0f172a; }
        .chat-container::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .chat-bubble { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">

    <header class="flex justify-between items-center pb-4 border-b border-gray-700">
        <div class="text-left">
            <h1 class="text-xl font-bold text-cyan-400">Chabybot ✨</h1>
            <p class="text-[10px] text-gray-400">Status: <span id="apiKeyStatus" class="text-red-500">Key Belum Set</span></p>
        </div>
        <button onclick="toggleSettings()" class="text-2xl p-2 hover:bg-gray-800 rounded-full transition-all">⚙️</button>
    </header>

    <div id="chatBox" class="chat-container overflow-y-auto my-4 space-y-4 p-2 flex-grow">
        <div class="chat-bubble bg-gray-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-sm border border-gray-700">
            Halo! Aku Chabybot. 🤖 Mau curhat, belajar, atau minta aku lukis sesuatu? Pasang API Key dulu di menu setting ya! 😉
        </div>
    </div>

    <div class="pb-4">
        <div class="flex gap-2 bg-gray-800 p-2 rounded-full border border-gray-700 shadow-xl focus-within:border-cyan-500 transition-all">
            <input id="userInput" type="text" placeholder="Tanya Chabybot..." 
                class="flex-1 bg-transparent px-4 py-2 outline-none text-sm"
                onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-cyan-600 p-3 rounded-full hover:bg-cyan-500 active:scale-95 transition-all">
                🚀
            </button>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
        <div class="bg-slate-900 border border-gray-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-2 text-cyan-400 text-center">Pengaturan Bot</h2>
            <p class="text-[11px] text-gray-500 mb-6 text-center italic">Key disimpan aman di browser HP kamu.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 block mb-1 ml-1">Groq API Key:</label>
                    <input id="groqInput" type="password" placeholder="gsk_..." class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-500 outline-none text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1 ml-1">Hugging Face Token:</label>
                    <input id="hfInput" type="password" placeholder="hf_..." class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 focus:border-cyan-500 outline-none text-sm">
                </div>
            </div>

            <div class="flex flex-col gap-2 mt-8">
                <button onclick="saveSettings()" class="w-full bg-cyan-600 p-3 rounded-xl font-bold shadow-lg shadow-cyan-900/20">Simpan Perubahan</button>
                <button onclick="toggleSettings()" class="w-full bg-transparent p-2 text-gray-400 text-sm">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        let GROQ_API_KEY = localStorage.getItem('groq_key') || "";
        let HF_API_KEY = localStorage.getItem('hf_key') || "";

        // Jalankan pengecekan status saat web dibuka
        window.onload = updateKeyStatus;

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
            document.getElementById('groqInput').value = GROQ_API_KEY;
            document.getElementById('hfInput').value = HF_API_KEY;
        }

        function saveSettings() {
            const g = document.getElementById('groqInput').value.trim();
            const h = document.getElementById('hfInput').value.trim();
            if (g && h) {
                localStorage.setItem('groq_key', g);
                localStorage.setItem('hf_key', h);
                GROQ_API_KEY = g;
                HF_API_KEY = h;
                updateKeyStatus();
                toggleSettings();
                alert("Siap! Chabybot sudah aktif. ✨");
            } else {
                alert("Isi kedua key-nya dulu ya!");
            }
        }

        function updateKeyStatus() {
            const status = document.getElementById('apiKeyStatus');
            if (GROQ_API_KEY && HF_API_KEY) {
                status.innerText = "Aktif ✅";
                status.className = "text-green-500";
            } else {
                status.innerText = "Key Belum Set ❌";
                status.className = "text-red-500";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const msg = input.value.trim();

            if (!msg) return;
            if (!GROQ_API_KEY || !HF_API_KEY) {
                alert("Atur API Key dulu di menu ⚙️ ya!");
                toggleSettings();
                return;
            }

            // Tampilkan pesan user
            chatBox.innerHTML += `<div class="chat-bubble ml-auto bg-cyan-700 p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-md">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Cek apakah minta gambar
            if (msg.toLowerCase().match(/(gambar|lukis|foto|tunjukkan)/)) {
                addReply("Bentar ya, aku lukiskan dulu... 🎨");
                await generateImage(msg);
            } else {
                await chatWithAI(msg);
            }
        }

        async function chatWithAI(text) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "qwen/qwen3-32b",
                        messages: [
                            { role: "system", content: "Kamu Chabybot, AI yang ramah, asik, dan suka membantu. Gunakan bahasa Indonesia santai (Gue/Lo atau Aku/Kamu), bisa jadi konsultan kesehatan, teman curhat, dan juga teman diskusi hal yang sensitif dan terkadang dianggap tabu, namun penting didiskusikan, seperti soal kesahatan seksual dan sebagainya. Gunakan emoji agar ceria!" },
                            { role: "user", content: text }
                        ],
                        temperature: 0.8
                    })
                });
                const data = await response.json();
                addReply(data.choices[0].message.content);
            } catch (e) {
                addReply("Waduh, koneksi ke Groq bermasalah. Cek API Key kamu ya! 😅");
            }
        }

        async function generateImage(prompt) {
            try {
                const response = await fetch("https://router.huggingface.co/t2i", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${HF_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: prompt })
                });
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                addReply(`<img src="${url}" class="rounded-xl w-full mt-2 shadow-lg" />`);
            } catch (e) {
                addReply("Gagal melukis nih, pastikan Token Hugging Face bener ya! 😢");
            }
        }

        function addReply(content) {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="chat-bubble bg-gray-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm border border-gray-700 shadow-sm">${content}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
