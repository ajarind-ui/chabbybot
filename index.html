<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chabybot Ultimate ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Menggunakan dasar style.css kamu */
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; margin: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .chat-container { height: calc(100vh - 220px); overflow-y: auto; }
        .chat-bubble { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glow-focus:focus { box-shadow: 0 0 15px rgba(8, 145, 178, 0.3); border-color: #0891b2; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">

    <header class="flex justify-between items-center pb-2 border-b border-gray-700">
        <div>
            <h1 class="text-xl font-bold text-cyan-400">Chabybot ✨</h1>
            <select id="modelSelect" class="bg-transparent text-[10px] text-gray-400 outline-none border-none cursor-pointer">
                <option value="qwen/qwen3-32b" class="bg-slate-900 text-white">Qwen 3 32B (Default)</option>
                <option value="llama-3.3-70b-versatile" class="bg-slate-900 text-white">Llama 3.3 70B</option>
                <option value="llama-3.1-8b-instant" class="bg-slate-900 text-white">Llama 3.1 8B (Fast)</option>
            </select>
        </div>
        <button onclick="toggleSettings()" class="text-2xl p-2 hover:bg-gray-800 rounded-full transition-all">⚙️</button>
    </header>

    <div id="chatBox" class="chat-container my-4 space-y-4 p-2 flex-grow"></div>

    <div class="pb-4 space-y-2">
        <div id="statusIndicator" class="text-[10px] text-center text-gray-500 italic">Mode: Groq API Active</div>
        <div class="flex gap-2 bg-gray-800 p-2 rounded-full border border-gray-700 shadow-xl focus-within:border-cyan-500 transition-all">
            <input id="userInput" type="text" placeholder="Tanya sesuatu..." class="flex-1 bg-transparent px-4 py-2 outline-none text-sm glow-focus" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-cyan-600 p-3 rounded-full hover:bg-cyan-500 active:scale-95 transition-all">🚀</button>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
        <div class="bg-slate-900 border border-gray-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-lg font-bold mb-4 text-cyan-400 text-center">API Management</h2>
            <div class="space-y-3">
                <input id="groqInput" type="password" placeholder="Groq Key (Utama)" class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-sm outline-none">
                <input id="geminiInput" type="password" placeholder="Gemini Key (Cadangan)" class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-sm outline-none">
                <input id="hfInput" type="password" placeholder="Hugging Face (Gambar)" class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-2 mt-6">
                <button onclick="saveSettings()" class="bg-cyan-600 p-3 rounded-xl font-bold">Simpan & Refresh</button>
                <button onclick="clearChat()" class="text-red-400 text-xs p-2">🗑️ Reset History</button>
                <button onclick="toggleSettings()" class="text-gray-500 text-sm">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        let GROQ_KEY = localStorage.getItem('groq_key') || "";
        let GEMINI_KEY = localStorage.getItem('gemini_key') || "";
        let HF_KEY = localStorage.getItem('hf_key') || "";
        let chatHistory = JSON.parse(localStorage.getItem('chabby_history')) || [];

        window.onload = () => {
            if (chatHistory.length > 0) {
                chatHistory.forEach(msg => addMessageToUI(msg.content, msg.role === 'user'));
            } else {
                addMessageToUI("Halo! Pilih model di atas dan kita mulai ngobrol. 🤖", false);
            }
        };

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }

        function saveSettings() {
            localStorage.setItem('groq_key', document.getElementById('groqInput').value.trim());
            localStorage.setItem('gemini_key', document.getElementById('geminiInput').value.trim());
            localStorage.setItem('hf_key', document.getElementById('hfInput').value.trim());
            location.reload();
        }

        function addMessageToUI(content, isUser) {
            const chatBox = document.getElementById('chatBox');
            const bg = isUser ? "ml-auto bg-cyan-700 rounded-tr-none" : "bg-gray-800 rounded-tl-none border border-gray-700";
            chatBox.innerHTML += `<div class="chat-bubble ${bg} p-3 rounded-2xl max-w-[85%] text-sm shadow-md">${content}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg || !GROQ_KEY) return;

            addMessageToUI(msg, true);
            chatHistory.push({ role: 'user', content: msg });
            localStorage.setItem('chabby_history', JSON.stringify(chatHistory));
            input.value = '';

            if (msg.toLowerCase().match(/(gambar|lukis|foto)/)) {
                addMessageToUI("🎨 Melukis dulu ya...", false);
                await generateImage(msg);
            } else {
                await fetchAIResponse(msg);
            }
        }

        async function fetchAIResponse(text) {
            const model = document.getElementById('modelSelect').value;
            const status = document.getElementById('statusIndicator');
            
            try {
                status.innerText = `Menggunakan Groq (${model})...`;
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: "system", content: "Kamu AI asik. No thinking process." }, ...chatHistory.slice(-5)]
                    })
                });

                if (!response.ok) throw new Error("Groq Limit");
                const data = await response.json();
                addReply(data.choices[0].message.content);
                status.innerText = "Mode: Groq API Active";
            } catch (e) {
                if (GEMINI_KEY) {
                    status.innerText = "Groq Limit! Beralih ke Gemini...";
                    await fetchGeminiResponse(text);
                } else {
                    addReply("Groq bermasalah & Gemini Key belum ada! 😅");
                }
            }
        }

        async function fetchGeminiResponse(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                addReply(data.candidates[0].content.parts[0].text);
            } catch (e) { addReply("Semua API sedang sibuk, Bro! 😫"); }
        }

        async function generateImage(prompt) {
    try {
        // Ganti model ke FLUX.1 agar lebih stabil
        const modelId = "black-forest-labs/FLUX.1-schnell"; 
        
        const response = await fetch(`https://api-inference.huggingface.co/models/${modelId}`, {
            method: "POST",
            headers: { 
                "Authorization": `Bearer ${HF_KEY}`, 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({ inputs: prompt })
        });

        if (!response.ok) throw new Error("HF API Error");

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        addReply(`<img src="${url}" class="rounded-xl w-full mt-2 shadow-lg" alt="Generated Image" />`);
    } catch (e) {
        console.error(e);
        addReply("Gagal melukis nih, HF lagi sibuk atau token salah! 😢");
    }
}
        function addReply(content) {
            addMessageToUI(content, false);
            chatHistory.push({ role: 'assistant', content: content });
            localStorage.setItem('chabby_history', JSON.stringify(chatHistory));
        }

        function clearChat() { localStorage.removeItem('chabby_history'); location.reload(); }
    </script>
</body>
</html>
